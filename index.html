<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willyow | Ya Estamos</title>
    <style>
        /* Diseño general y colores */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px 0;
            text-align: center;
        }
        
        /* Foto de perfil del artista */
        .artist-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 2.2em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Sección del Lanzamiento Debut */
        .release-box {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 25px 20px;
            margin: 30px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .release-box h2 {
            color: #1db954; 
            margin-top: 0;
            font-size: 1.2em;
        }
        .cover-art {
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* Botones de Redes y Plataformas */
        .btn {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin: 12px 0;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn-spotify { background-color: #1DB954; }
        .btn-youtube { background-color: #FF0000; }
        .btn-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        /* Pie de página (Management) */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-size: 0.9em;
            color: #aaaaaa;
        }
        .footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .footer a:hover {
            color: #1db954;
        }
    </style>
</head>
